version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: library_db
    restart: always
    environment:
      POSTGRES_DB: ${PGDATABASE:-library_db}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${PGDATABASE:-library_db}
      - PGUSER=${PGUSER:-postgres}
      - PGPASSWORD=${PGPASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-RNwXDFze6kJ5SW07UWbBCd8EVQVBOUGdPBbmOb5yU0U=}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    env_file:
      - .env
    volumes:
      - ./BooksDataset:/app/BooksDataset

volumes:
  postgres_data:
